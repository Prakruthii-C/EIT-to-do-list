<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Daily Task Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-wrapper">
        <aside class="sidebar">
            <h1>Daily Tasks</h1>
            <p>Stay organised with your daily task list</p>
            <hr class="side-line">
        </aside>

        <main class="main-content">
            <div class="status-box">
                <p id="status-display">0/0 Tasks Done</p>
            </div>

            <div class="progress-container">
                <label>Daily Progress:</label>
                <div class="progress-bar-bg">
                    <div id="progress-bar" style="width: 0%;"></div>
                </div>
            </div>

            <form id="task-form">
                <input type="text" id="newtask" placeholder="Enter task..." required>
                <select id="category">
                    <option value="Work">Work</option>
                    <option value="Personal">Personal</option>
                </select>
                <button type="submit">Add Task</button>
            </form>

            <div class="lists-wrapper">
                <section id="pending-section">
                    <h2>Pending</h2>
                    <ol id="task-list"></ol>
                </section>
                <section id="completed-section">
                    <h2>Completed</h2>
                    <ol id="completed-list"></ol>
                </section>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
